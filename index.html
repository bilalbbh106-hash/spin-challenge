<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🌀 تحدي الدوران - ادرها 10 مرات واربح</title>
    <style>
        /* ===== إعدادات عامة ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0b0b1a, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            direction: rtl;
            /* إضافة مساحة للإعلان العلوي الثابت */
            padding-top: 100px;
        }
        /* ===== الحاوية الرئيسية ===== */
        .container {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 30px 25px;
            max-width: 520px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            text-align: center;
            position: relative;
            z-index: 1;
        }
        /* ===== إعلان بنر علوي (داخلي) ===== */
        .banner-top,
        .banner-bottom {
            background: rgba(0, 0, 0, 0.3);
            padding: 14px 10px;
            border-radius: 18px;
            margin: 12px 0;
            border: 1px dashed rgba(255, 255, 255, 0.06);
            color: #888;
            font-size: 13px;
            min-height: 70px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
        }
        .banner-top {
            margin-top: 0;
        }
        .banner-top.active,
        .banner-bottom.active {
            border-color: #6bcb77;
            color: #6bcb77;
        }
        /* ===== العنوان ===== */
        .title {
            font-size: 28px;
            font-weight: 800;
            margin: 10px 0 5px;
            background: linear-gradient(135deg, #f093fb, #f5576c, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: #aaa;
            font-size: 15px;
            margin-bottom: 18px;
        }
        /* ===== الدائرة الدوارة ===== */
        .circle-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 10px auto 20px;
        }
        .circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #ff6b6b);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            box-shadow: 0 0 50px rgba(255, 107, 107, 0.25), inset 0 0 30px rgba(0, 0, 0, 0.2);
            border: 4px solid rgba(255, 255, 255, 0.15);
            user-select: none;
        }
        .circle.spinning {
            animation: spin 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg) scale(1);
            }
            50% {
                transform: rotate(720deg) scale(1.08);
            }
            100% {
                transform: rotate(720deg) scale(1);
            }
        }
        /* تأثير النبض عند الضغط */
        .circle.pulse {
            animation: pulse 0.3s ease;
        }
        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(0.92);
            }
            100% {
                transform: scale(1);
            }
        }

        /* ===== الزر ===== */
        .btn-spin {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
            color: #fff;
            font-size: 24px;
            font-weight: 700;
            padding: 16px 50px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.35);
            transition: 0.25s;
            border: 2px solid rgba(255, 255, 255, 0.1);
            letter-spacing: 1px;
            margin: 5px 0 12px;
        }
        .btn-spin:hover {
            transform: scale(1.04);
            box-shadow: 0 15px 40px rgba(245, 87, 108, 0.5);
        }
        .btn-spin:active {
            transform: scale(0.94);
        }

        /* ===== العداد ===== */
        .counter-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 14px 20px;
            border-radius: 60px;
            display: inline-block;
            margin: 8px 0 12px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .counter-box span {
            font-size: 34px;
            font-weight: 800;
            color: #ffd93d;
            margin: 0 5px;
        }
        .counter-box .label {
            font-size: 18px;
            color: #ccc;
        }

        /* ===== الهدف ===== */
        .target-text {
            font-size: 18px;
            color: #aaa;
            margin: 10px 0 5px;
        }
        .target-text b {
            color: #ffd93d;
            font-size: 22px;
        }

        /* ===== شريط التقدم ===== */
        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            margin: 15px 0 8px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f093fb, #f5576c, #ffd93d);
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        /* ===== رسالة الإكمال ===== */
        .complete-msg {
            font-size: 18px;
            font-weight: 600;
            color: #ffd93d;
            margin: 12px 0 5px;
            min-height: 35px;
            opacity: 0;
            transition: 0.4s;
        }
        .complete-msg.show {
            opacity: 1;
        }

        /* ===== إعلان منبثق (يظهر كل 3 ضغطات) ===== */
        .popup-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: 9998;
            backdrop-filter: blur(4px);
        }
        .popup-ad {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a2e;
            padding: 30px 25px;
            border-radius: 30px;
            z-index: 9999;
            border: 2px solid #f5576c;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
            width: 90%;
            max-width: 400px;
            text-align: center;
            color: #fff;
        }
        .popup-ad h2 {
            margin-bottom: 10px;
            font-size: 24px;
        }
        .popup-ad p {
            color: #bbb;
            font-size: 15px;
            margin: 8px 0;
        }
        .popup-ad .ad-code {
            background: rgba(0, 0, 0, 0.3);
            padding: 18px;
            border-radius: 14px;
            margin: 15px 0;
            border: 1px dashed rgba(255, 255, 255, 0.06);
            color: #888;
            font-size: 13px;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .popup-ad .close-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
            color: #fff;
            padding: 12px 35px;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .popup-ad .close-btn:hover {
            transform: scale(1.04);
        }

        /* ===== متجاوب ===== */
        @media (max-width: 480px) {
            body {
                padding-top: 80px;
            }
            .container {
                padding: 20px 15px;
            }
            .title {
                font-size: 22px;
            }
            .circle-wrapper {
                width: 160px;
                height: 160px;
            }
            .circle {
                font-size: 36px;
            }
            .btn-spin {
                font-size: 20px;
                padding: 14px 35px;
            }
            .counter-box span {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== إعلان A-Ads العلوي الثابت (كودك) ===== -->

    <!-- ===== الحاوية الرئيسية ===== -->
    <div class="container">

        <!-- 🔴 إعلان بنر علوي (داخلي - يمكنك وضعه اختياريًا) -->
        <div class="banner-top active" id="bannerTop">
            📢 <strong>إعلان بنر إضافي</strong> — ضع كود AdSense هنا
        </div>

        <!-- العنوان -->
        <div class="title">🌀 تحدي الدوران</div>
        <div class="subtitle">اضغط على الزر أو الدائرة لتشغيل التحدي</div>

        <!-- الدائرة الدوارة -->
        <div class="circle-wrapper">
            <div class="circle" id="circleDisplay">🌟</div>
        </div>

        <!-- زر الدوران -->
        <button class="btn-spin" id="spinBtn">🔄 ادرها</button>

        <!-- العداد -->
        <div class="counter-box">
            <span class="label">عدد الضغطات :</span>
            <span id="clickCount">0</span>
        </div>

        <!-- الهدف -->
        <div class="target-text">
            🎯 الهدف: <b id="targetDisplay">10</b> ضغطات
        </div>

        <!-- شريط التقدم -->
        <div class="progress-bar">
            <div class="fill" id="progressFill"></div>
        </div>

        <!-- رسالة الإكمال -->
        <div class="complete-msg" id="completeMsg">🏆 مبروك! لقد أكملت التحدي!</div>

        <!-- 🟡 إعلان بنر سفلي (داخلي - يمكنك وضعه اختياريًا) -->
        <div class="banner-bottom active" id="bannerBottom">
            📢 <strong>إعلان بنر إضافي</strong> — ضع كود AdSense هنا
        </div>

    </div>

    <!-- ===== الإعلان المنبثق (يظهر كل 3 ضغطات) ===== -->
    <div class="popup-overlay" id="popupOverlay"></div>
    <div class="popup-ad" id="popupAd">
        <h2>🎁 عرض خاص</h2>
        <p>إعلان منبثق — يظهر تلقائيًا</p>
        <div class="ad-code">
            📢 ضع هنا كود الإعلان المنبثق<br />
            (مثل PropellerAds أو Adsterra)
        </div>
        <button class="close-btn" id="closePopup">إغلاق</button>
    </div>

    <!-- ===== جافاسكريبت ===== -->
    <script>
        (function() {
            'use strict';

            // ===== عناصر الصفحة =====
            const circle = document.getElementById('circleDisplay');
            const spinBtn = document.getElementById('spinBtn');
            const clickSpan = document.getElementById('clickCount');
            const targetSpan = document.getElementById('targetDisplay');
            const progressFill = document.getElementById('progressFill');
            const completeMsg = document.getElementById('completeMsg');
            const popupOverlay = document.getElementById('popupOverlay');
            const popupAd = document.getElementById('popupAd');
            const closePopupBtn = document.getElementById('closePopup');

            // ===== إعدادات =====
            const TARGET = 10;
            const POPUP_FREQUENCY = 3;
            const COMPLETE_MESSAGE = '🏆 مبروك! لقد أكملت التحدي بنجاح!';

            let count = 0;
            let isCompleted = false;

            // ===== تحديث واجهة العداد والتقدم =====
            function updateUI() {
                clickSpan.textContent = count;

                // شريط التقدم
                const percent = Math.min((count / TARGET) * 100, 100);
                progressFill.style.width = percent + '%';

                // تغيير لون شريط التقدم عند الاقتراب من الهدف
                if (percent >= 80) {
                    progressFill.style.background = 'linear-gradient(90deg, #ffd93d, #f5576c)';
                } else {
                    progressFill.style.background = 'linear-gradient(90deg, #f093fb, #f5576c, #ffd93d)';
                }

                // رسالة الإكمال
                if (count >= TARGET && !isCompleted) {
                    isCompleted = true;
                    completeMsg.textContent = COMPLETE_MESSAGE;
                    completeMsg.classList.add('show');
                    // تأثير نبض
                    circle.classList.add('pulse');
                    setTimeout(() => circle.classList.remove('pulse'), 300);
                } else if (count < TARGET) {
                    completeMsg.classList.remove('show');
                }

                // حفظ التقدم في localStorage
                localStorage.setItem('spinCount', count);
            }

            // ===== دوران الدائرة =====
            function spinCircle() {
                // منع الضغط بعد الإكمال (لكن نحرك الدائرة فقط)
                if (count >= TARGET) {
                    circle.classList.remove('spinning');
                    setTimeout(() => {
                        circle.classList.add('spinning');
                    }, 10);
                    const emojis = ['🌟', '🔥', '⚡', '💫', '🎯', '🏆', '🚀', '🎉', '⭐', '🌀'];
                    const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
                    setTimeout(() => {
                        circle.textContent = randomEmoji;
                    }, 400);
                    return;
                }

                // زيادة العداد
                count++;
                updateUI();

                // تشغيل حركة الدوران
                circle.classList.remove('spinning');
                setTimeout(() => {
                    circle.classList.add('spinning');
                }, 10);

                // تغيير الإيموجي بشكل عشوائي
                const emojis = ['🌟', '🔥', '⚡', '💫', '🎯', '🏆', '🚀', '🎉', '⭐', '🌀'];
                const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
                setTimeout(() => {
                    circle.textContent = randomEmoji;
                }, 450);

                // ===== إظهار إعلان منبثق كل 3 ضغطات =====
                if (count % POPUP_FREQUENCY === 0 && count < TARGET) {
                    popupOverlay.style.display = 'block';
                    popupAd.style.display = 'block';
                }
            }

            // ===== إغلاق الإعلان المنبثق =====
            function closePopup() {
                popupOverlay.style.display = 'none';
                popupAd.style.display = 'none';
            }

            // ===== أحداث الأزرار =====
            spinBtn.addEventListener('click', spinCircle);
            circle.addEventListener('click', spinCircle);
            closePopupBtn.addEventListener('click', closePopup);
            popupOverlay.addEventListener('click', closePopup);

            // ===== استعادة العداد من localStorage =====
            const savedCount = parseInt(localStorage.getItem('spinCount'));
            if (!isNaN(savedCount) && savedCount > 0) {
                count = Math.min(savedCount, TARGET);
                updateUI();
                if (count >= TARGET) {
                    isCompleted = true;
                    completeMsg.textContent = COMPLETE_MESSAGE;
                    completeMsg.classList.add('show');
                }
            }

            console.log('🚀 تحدي الدوران جاهز!');
            console.log(`🎯 الهدف: ${TARGET} ضغطات`);
            console.log('📢 إعلان A-Ads يعمل في الأعلى');

        })();
    </script>

</body>
</html>
